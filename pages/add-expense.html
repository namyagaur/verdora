<div class="add-expense-form card">
  <h2>Add New Expense</h2>
  <label>Amount</label>
  <input type="number" placeholder="0.00">
  <label>Date</label>
  <input type="text" placeholder="Select Date">
  <label>Description</label>
  <input type="text" placeholder="E.g., Lunch, Movie, Taxi">
  <label>Category</label>
  <div class="category-tabs">
    <div class="category-tab">🍔 Food</div>
    <div class="category-tab">🚗 Transport</div>
    <div class="category-tab">🎬 Entertainment</div>
    <div class="category-tab">💡 Bills</div>
    <div class="category-tab">🛍️ Shopping</div>
    <div class="category-tab">💊 Health</div>
    <div class="category-tab">✨ Other</div>
  </div>
  <button>Add Expense</button>
</div>
<link rel="stylesheet" href="../css/add.css">
<script src="../scripts/add.js"></script>
