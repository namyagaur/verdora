<div class="expenses-page card">
  <h2>Expense History</h2>
  <div class="expenses-controls">
    <input type="text" placeholder="Search expenses...">
    <select>
      <option>All Categories</option>
      <option>Food</option>
      <option>Transport</option>
      <option>Entertainment</option>
      <option>Bills</option>
      <option>Shopping</option>
      <option>Health</option>
      <option>Other</option>
    </select>
  </div>
  <div class="expense-list">
    <div class="expense-item">
      <div class="expense-left">
        <div class="expense-amount">$25</div>
        <div class="expense-title">Lunch at cafe</div>
        <div class="expense-date">Dec 16, 2024</div>
      </div>
      <div class="expense-right">
        <div class="expense-category food">Food</div>
      </div>
    </div>
  </div>
</div>
